<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan A Drink</title>

<style>

body{
margin:0;
background:black;
font-family:Helvetica, Arial, sans-serif;
color:white;

min-height:200vh;
overflow-x:hidden;
overflow-y:auto;
}

/* ---------------- LOADING SCREEN ---------------- */

#loadingScreen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
transition:opacity .7s ease;
}

/* heartbeat glow */
@keyframes glowBeat{
0%,45%,100% { filter:drop-shadow(0 0 2px rgba(255,255,255,.25)); }
8% { filter:drop-shadow(0 0 12px rgba(255,255,255,.95)); }
16% { filter:drop-shadow(0 0 5px rgba(255,255,255,.35)); }
24% { filter:drop-shadow(0 0 11px rgba(255,255,255,.75)); }
32% { filter:drop-shadow(0 0 3px rgba(255,255,255,.25)); }
}

.logoOutline{
fill:none;
stroke:white;
stroke-width:2.5;
animation:glowBeat 2.6s ease-in-out infinite;
}

/* ---------------- DRINK PAGE ---------------- */

#drinksScreen{
display:none;
padding:40px;
}

.title{
font-size:38px;      
letter-spacing:4px;
margin-bottom:10px;
font-weight:600;
}

.subtitle{
font-size:18px;
opacity:.85;
margin-bottom:40px;
max-width:600px;
text-shadow: 0 0 8px rgb(255, 255, 255);
}

.scrollContainer{
display:flex;
gap:32px;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
#mixerScreen .scrollContainer{
    flex-direction:column;
    overflow-x:hidden;
    gap:25px;
}
#mixerScreen .drinkCard{
    min-width:100%;
    height:auto;
    background:none;
    border-radius:0;
    box-shadow:none;
    padding:20px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
}

.scrollContainer::-webkit-scrollbar{
display:none;
}

.drinkCard{
min-width:420px;
height:400px;
background:#0f0f0f;
border-radius:42px;
padding:40px;
scroll-snap-align:start;
box-shadow:0 25px 70px rgba(0,0,0,.65);
}

.drinkName{
font-size:46px;
letter-spacing:8px;
text-align:center;
margin-bottom:40px;
filter:drop-shadow(0 0 10px rgba(255,255,255,.15));
}

.glass{
width:200px;
display:block;
margin:auto;
}

.glassOutline{
stroke:white;
stroke-width:4;
fill:rgba(255,255,255,.04);
}

.rimOuter{
stroke:white;
stroke-width:4;
fill:none;
}

.rimInner{
stroke:rgba(255,255,255,.55);
stroke-width:2;
fill:none;
}

.liquid{
filter:drop-shadow(0 0 12px rgba(255,255,255,.1));
}
/* -------- MIXER SCREEN -------- */

#mixerScreen{
    display:none;
    padding:30px 25px;
}

.mixerList{
    display:flex;
    flex-direction:column;
    gap:25px;
    margin-top:40px;
}

.mixerItem{
    font-size:28px;
    letter-spacing:3px;
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
    cursor:pointer;
    transition:all .2s ease;
}

.mixerItem:hover{
    color:#ffffff;
    text-shadow:0 0 10px rgba(255,255,255,.5);
    transform:translateX(6px);
}
.mixerRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
    font-size:22px;
}
.mixerName{
    flex:1;
}

.quantityBox{
    min-width:120px;
    display:flex;
    justify-content:flex-end;
}

.addBtn{
    width:44px;
    height:44px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
    font-size:26px;
    cursor:pointer;
}

.counter{
    display:flex;
    align-items:center;
    gap:15px;
}

.minusBtn,
.plusBtn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
    font-size:20px;
    cursor:pointer;
}

.qty{
    font-size:20px;
}

.mixerLayout{
    display:flex;
    gap:40px;
}

.mixerList{
    flex:2;
}

.orderSection{
    flex:1;
    border-left:1px solid rgba(255,255,255,.2);
    padding-left:25px;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->

<div id="loadingScreen">

<svg viewBox="0 0 800 200" width="80%">

<defs>
<mask id="text-mask">
<rect width="100%" height="100%" fill="black"/>
<text x="50%" y="60%" text-anchor="middle"
font-size="120"
font-family="Helvetica"
fill="white">ScanADrink</text>
</mask>
</defs>

<text x="50%" y="60%" text-anchor="middle"
font-size="120"
font-family="Helvetica"
class="logoOutline">ScanADrink</text>

<g mask="url(#text-mask)">
<path id="wavePath" fill="#8A2BE2"></path>
</g>

</svg>

</div>


<!-- DRINKS SCREEN -->

<div id="drinksScreen">

<div class="title">ALCOHOLIC DRINKS</div>
<div class="subtitle">
Choose the base of your beverage, then select your mixer.
</div>

<div class="scrollContainer">

<!-- VODKA -->

<div class="drinkCard">

<div class="drinkName">VODKA</div>

<svg class="glass" viewBox="0 0 200 260">

<defs>

<clipPath id="clipVodka">
<path d="M66 46 L78 218 Q100 242 122 218 L134 46 Z"/>
</clipPath>

<linearGradient id="vodkaColor" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#e9d1a8"/>
<stop offset="100%" stop-color="#b8893d"/>
</linearGradient>

</defs>

<ellipse class="rimOuter" cx="100" cy="46" rx="46" ry="12"/>
<ellipse class="rimInner" cx="100" cy="46" rx="38" ry="9"/>

<path class="glassOutline" d="M54 46 L70 220 Q100 252 130 220 L146 46"/>

<g clip-path="url(#clipVodka)">
<path id="vodkaLiquid" class="liquid" fill="url(#vodkaColor)"></path>
</g>

</svg>

</div>

<!-- GIN -->

<div class="drinkCard">

<div class="drinkName">GIN</div>

<svg class="glass" viewBox="0 0 200 260">

<defs>

<clipPath id="clipGin">
<path d="M66 46 L78 218 Q100 242 122 218 L134 46 Z"/>
</clipPath>

</defs>

<ellipse class="rimOuter" cx="100" cy="46" rx="46" ry="12"/>
<ellipse class="rimInner" cx="100" cy="46" rx="38" ry="9"/>

<path class="glassOutline" d="M54 46 L70 220 Q100 252 130 220 L146 46"/>

<g clip-path="url(#clipGin)">
<path id="ginLiquid" class="liquid" fill="#ffe6b3"></path>
</g>

</svg>

</div>

<!-- WHISKEY -->

<div class="drinkCard">

<div class="drinkName">WHISKEY</div>

<svg class="glass" viewBox="0 0 200 260">

<defs>

<clipPath id="clipWhiskey">
<path d="M66 46 L78 218 Q100 242 122 218 L134 46 Z"/>
</clipPath>

</defs>

<ellipse class="rimOuter" cx="100" cy="46" rx="46" ry="12"/>
<ellipse class="rimInner" cx="100" cy="46" rx="38" ry="9"/>

<path class="glassOutline" d="M54 46 L70 220 Q100 252 130 220 L146 46"/>

<g clip-path="url(#clipWhiskey)">
<path id="whiskeyLiquid" class="liquid" fill="#2c170d"></path>
</g>

</svg>

</div>

<!-- RUM -->

<div class="drinkCard">

<div class="drinkName">RUM</div>

<svg class="glass" viewBox="0 0 200 260">

<defs>

<clipPath id="clipRum">
<path d="M66 46 L78 218 Q100 242 122 218 L134 46 Z"/>
</clipPath>

</defs>

<ellipse class="rimOuter" cx="100" cy="46" rx="46" ry="12"/>
<ellipse class="rimInner" cx="100" cy="46" rx="38" ry="9"/>

<path class="glassOutline" d="M54 46 L70 220 Q100 252 130 220 L146 46"/>

<g clip-path="url(#clipRum)">
<path id="rumLiquid" class="liquid" fill="#4a1f12"></path>
</g>

</svg>

</div>

</div>
</div>

<!-- MIXER SCREEN -->
<div id="mixerScreen">

    <div class="mixerLayout">

        <div class="mixerList">
           <div class="mixerRow">
        <span class="mixerName">COKE</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>

    <div class="mixerRow">
        <span class="mixerName">SPRITE</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>

    <div class="mixerRow">
        <span class="mixerName">FANTA</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>

    <div class="mixerRow">
        <span class="mixerName">TONIC</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>

    <div class="mixerRow">
        <span class="mixerName">REDBULL</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>

    <div class="mixerRow">
        <span class="mixerName">WATER</span>
        <div class="quantityBox">
            <button class="addBtn">+</button>
            <div class="counter" style="display:none;">
                <button class="minusBtn">-</button>
                <span class="qty">1</span>
                <button class="plusBtn">+</button>
            </div>
        </div>
    </div>  
            <!-- ALL mixerRow blocks stay here -->
        </div>

        <div class="orderSection">
            <div style="font-size:22px;">YOUR ORDER</div>
            <div id="orderList" style="margin-top:15px;"></div>

            <br>

            <button onclick="registerOrder()"
                style="padding:14px;
                       border:none;
                       border-radius:25px;
                       background:white;
                       color:black;
                       width:100%;
                       font-size:18px;">
                Register Order
            </button>
        </div>

    </div>

    <br><br>

    <button onclick="goBack()"
        style="padding:10px 18px;
               border:none;
               border-radius:20px;
               background:white;
               color:black;">
        Back
    </button>

</div>
<script>  
let order = [];
let currentBase = "";    
/* -------- LOADING LOGO -------- */

const wave=document.getElementById("wavePath")

let width=800
let height=200
let freq=.02
let phase=0
let fill=200
let velocity=0
let done=false

function animateLogo(){

if(fill>0){
velocity+=.03
velocity*=.97
fill-=velocity
}

let path=`M0 ${fill} `

for(let x=0;x<=width;x++){
let y=6*Math.sin((x*freq)+phase)+fill
path+=`L${x} ${y} `
}

path+=`L${width} ${height} L0 ${height} Z`

wave.setAttribute("d",path)

phase+=.08

if(fill<=0 && !done){

done=true

setTimeout(()=>{
document.getElementById("loadingScreen").style.opacity=0

setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none"
document.getElementById("drinksScreen").style.display="block"
startDrinkAnimations()
},700)

},400)

}

requestAnimationFrame(animateLogo)

}

animateLogo()



/* -------- DRINK FILL ANIMATION -------- */

function startDrinkAnimations(){

const liquids=[
document.getElementById("vodkaLiquid"),
document.getElementById("ginLiquid"),
document.getElementById("whiskeyLiquid"),
document.getElementById("rumLiquid")
]

let fillY=260
let target=74
let phase=0

function animate(){

if(fillY>target){
fillY-=1.4
phase+=0.1
}

let path=`M-40 ${fillY} `

for(let x=-40;x<=240;x++){
let y=fillY+Math.sin((x*.05)+phase)*4
path+=`L${x} ${y} `
}

path+=`L240 260 L-40 260 Z`

liquids.forEach(l=>{
l.setAttribute("d",path)
})

requestAnimationFrame(animate)

}

animate()

}
/* -------- CLICK LOGIC -------- */

const cards = document.querySelectorAll(".drinkCard");

cards.forEach(card=>{
card.addEventListener("click",()=>{
const name = card.querySelector(".drinkName").innerText;
currentBase = name; 
document.getElementById("drinksScreen").style.display="none";
document.getElementById("mixerScreen").style.display="block";
document.getElementById("mixerTitle").innerText = name + " MIXERS";
});
});

/* -------- MIXER CLICK -------- */

/* -------- NEW MIXER QUANTITY LOGIC -------- */

const mixerRows = document.querySelectorAll(".mixerRow");

mixerRows.forEach(row => {

    const addBtn = row.querySelector(".addBtn");
    const counter = row.querySelector(".counter");
    const minusBtn = row.querySelector(".minusBtn");
    const plusBtn = row.querySelector(".plusBtn");
    const qtyDisplay = row.querySelector(".qty");
    const mixerName = row.querySelector(".mixerName").innerText;

    let quantity = 1;

    addBtn.addEventListener("click", () => {
        addBtn.style.display = "none";
        counter.style.display = "flex";

        order.push({
            base: currentBase,
            mixer: mixerName,
            quantity: 1
        });

        updateOrderScreen();
    });

    plusBtn.addEventListener("click", () => {
        quantity++;
        qtyDisplay.innerText = quantity;

        const drink = order.find(d =>
            d.base === currentBase && d.mixer === mixerName
        );

        if(drink){
            drink.quantity = quantity;
        }

        updateOrderScreen();
    });

    minusBtn.addEventListener("click", () => {
        quantity--;

        if(quantity <= 0){
            counter.style.display = "none";
            addBtn.style.display = "block";
            quantity = 1;

            order = order.filter(d =>
                !(d.base === currentBase && d.mixer === mixerName)
            );
        } else {
            qtyDisplay.innerText = quantity;

            const drink = order.find(d =>
                d.base === currentBase && d.mixer === mixerName
            );

            if(drink){
                drink.quantity = quantity;
            }
        }

        updateOrderScreen();
    });

});

function goBack(){
    document.getElementById("mixerScreen").style.display = "none";
    document.getElementById("drinksScreen").style.display = "block";

    // Reset liquids before replay
    resetDrinkFill();

    // Replay animation
   
   startDrinkAnimations();
}
function resetDrinkFill(){
    const liquids = [
        document.getElementById("vodkaLiquid"),
        document.getElementById("ginLiquid"),
        document.getElementById("whiskeyLiquid"),
        document.getElementById("rumLiquid")
    ];

    liquids.forEach(l => {
        l.setAttribute("d", ""); // clear liquid path
    });
}

function addToOrder(mixerName, quantity){

    const existing = order.find(
        item => item.base === currentBase && item.mixer === mixerName
    );

    if(existing){
        existing.quantity = quantity;
    } else {
        order.push({
            base: currentBase,
            mixer: mixerName,
            quantity: quantity
        });
    }

    updateOrderScreen();
}

function updateOrderScreen(){

    const list = document.getElementById("orderList");
    list.innerHTML = "";

    order.forEach((drink,index)=>{

        const item = document.createElement("div");
        item.style.marginBottom = "20px";
        item.style.fontSize = "22px";

        item.innerText =
            drink.quantity + "x " + drink.base + " + " + drink.mixer;

        list.appendChild(item);
    });
}

function registerOrder(){

    if(order.length === 0){
        alert("No drinks selected");
        return;
    }

    alert("Order Registered!");

    order = [];
    updateOrderScreen();

    document.getElementById("mixerScreen").style.display = "none";
    document.getElementById("drinksScreen").style.display = "block";
}
</script>

</body>
</html>
