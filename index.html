<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan A Drink</title>

<style>

body{
margin:0;
background:black;
font-family:Helvetica, Arial, sans-serif;
color:white;

min-height:200vh;
overflow-x:hidden;
overflow-y:auto;
}

/* ---------------- LOADING SCREEN ---------------- */

#loadingScreen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
transition:opacity .7s ease;
}

/* heartbeat glow */
@keyframes glowBeat{
0%,45%,100% { filter:drop-shadow(0 0 2px rgba(255,255,255,.25)); }
8% { filter:drop-shadow(0 0 12px rgba(255,255,255,.95)); }
16% { filter:drop-shadow(0 0 5px rgba(255,255,255,.35)); }
24% { filter:drop-shadow(0 0 11px rgba(255,255,255,.75)); }
32% { filter:drop-shadow(0 0 3px rgba(255,255,255,.25)); }
}

.logoOutline{
fill:none;
stroke:white;
stroke-width:2.5;
animation:glowBeat 2.6s ease-in-out infinite;
}

/* ---------------- DRINK PAGE ---------------- */

#drinksScreen{
display:none;
padding:40px;
}

.title{
font-size:38px;      
letter-spacing:4px;
margin-bottom:10px;
font-weight:600;
}

.subtitle{
font-size:18px;
opacity:.85;
margin-bottom:40px;
max-width:600px;
text-shadow: 0 0 8px rgb(255, 255, 255);
}

.scrollContainer{
display:flex;
gap:32px;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
#mixerScreen .scrollContainer{
    flex-direction:column;
    overflow-x:hidden;
    gap:25px;
}
#mixerScreen .drinkCard{
    min-width:100%;
    height:auto;
    background:none;
    border-radius:0;
    box-shadow:none;
    padding:20px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
}

.scrollContainer::-webkit-scrollbar{
display:none;
}

.drinkCard{
min-width:420px;
height:400px;
background:#0f0f0f;
border-radius:42px;
padding:40px;
scroll-snap-align:start;
box-shadow:0 25px 70px rgba(0,0,0,.65);
}

.drinkName{
font-size:46px;
letter-spacing:8px;
text-align:center;
margin-bottom:40px;
filter:drop-shadow(0 0 10px rgba(255,255,255,.15));
}

.glass{
width:200px;
display:block;
margin:auto;
}

.glassOutline{
stroke:white;
stroke-width:4;
fill:rgba(255,255,255,.04);
}

.rimOuter{
stroke:white;
stroke-width:4;
fill:none;
}

.rimInner{
stroke:rgba(255,255,255,.55);
stroke-width:2;
fill:none;
}

.liquid{
filter:drop-shadow(0 0 12px rgba(255,255,255,.1));
}
/* -------- MIXER SCREEN -------- */

#mixerScreen{
    display:none;
    padding:30px 25px;
}

.mixerList{
    display:flex;
    flex-direction:column;
    gap:25px;
    margin-top:40px;
}

.mixerItem{
    font-size:28px;
    letter-spacing:3px;
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
    cursor:pointer;
    transition:all .2s ease;
}

.mixerItem:hover{
    color:#ffffff;
    text-shadow:0 0 10px rgba(255,255,255,.5);
    transform:translateX(6px);
}
.mixerRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,.15);
    font-size:22px;
}
.mixerName{
    flex:1;
}

.quantityBox{
    min-width:120px;
    display:flex;
    justify-content:flex-end;
}

.addBtn{
    width:44px;
    height:44px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
    font-size:26px;
    cursor:pointer;
}

.counter{
    display:flex;
    align-items:center;
    gap:15px;
}

.minusBtn,
.plusBtn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
    font-size:20px;
    cursor:pointer;
}

.qty{
    font-size:20px;
}

.mixerLayout{
    display:flex;
    gap:40px;
}

.mixerList{
    flex:2;
}

.orderSection{
    flex:1;
    border-left:1px solid rgba(255,255,255,.2);
    padding-left:25px;
}
.orderItem{
    color:#39ff14;
    text-shadow:
        0 0 5px #39ff14,
        0 0 10px #39ff14,
        0 0 20px #39ff14;
    font-weight:600;
}
.checkoutCard{
    background:#111;
    border-radius:20px;
    padding:25px;
    max-width:500px;
    margin:0 auto;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

.checkoutButtons{
    display:flex;
    gap:20px;
    margin-top:30px;
    justify-content:center;
}

.applePayBtn{
    flex:1;
    padding:15px;
    border-radius:15px;
    border:1px solid #39ff14;
    background:black;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.payBtn{
    flex:1;
    padding:15px;
    border-radius:15px;
    border:none;
    background:white;
    color:black;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<ellipse class="rimOuter" cx="100" cy="46" rx="46" ry="12"/>

</div>

<!-- MIXER SCREEN -->
<div id="mixerScreen">
    <div class="title" id="mixerTitle"></div>

    <div class="mixerLayout">

            <!-- ALL mixerRow blocks stay here -->
        </div>

        <div class="orderSection">
            <div style="font-size:22px;">YOUR ORDER</div>
            <div id="orderList" style="margin-top:15px;"></div>
            <button onclick="goToCheckout()"
    style="padding:14px;
           border:none;
           border-radius:25px;

           color:black;
           width:100%;

    Checkout
</button>

           width:100%;

<!-- CHECKOUT SCREEN -->
<div id="checkoutScreen" style="display:none; padding:40px;">

    <div class="title" style="text-align:center;">CHECKOUT</div>
    <div class="subtitle" style="text-align:center; margin-bottom:30px;">
        Order Summary
    </div>

    <div class="checkoutCard">

        <div style="font-size:20px; margin-bottom:20px;">Order Summary</div>

        <div id="checkoutList"></div>

        <hr style="border-color:rgba(255,255,255,.2); margin:20px 0;">

        <div style="display:flex; justify-content:space-between; font-size:22px;">
            <span>Total:</span>
            <span id="checkoutTotal">€0.00</span>
        </div>

    </div>

    <div class="checkoutButtons">
        <button class="applePayBtn"> Pay</button>
        <button class="payBtn" id="payNowBtn">Pay €0.00</button>
    </div>

    <div style="text-align:center; margin-top:20px; opacity:.6;">
        🔒 Secure encrypted payment
    </div>
<button onclick="backToMixer()"
    style="margin-top:30px; padding:10px 18px;
           border:none; border-radius:20px;
           background:white; color:black;">
    Back
</button>
</div>
<script>  
let order = [];
let currentBase = "";    
/* -------- LOADING LOGO -------- */

const wave=document.getElementById("wavePath")

let width=800
let height=200
let freq=.02
let phase=0
let fill=200
let velocity=0
let done=false

function animateLogo(){

if(fill>0){
velocity+=.03
velocity*=.97
fill-=velocity
}

let path=`M0 ${fill} `

for(let x=0;x<=width;x++){
let y=6*Math.sin((x*freq)+phase)+fill
path+=`L${x} ${y} `
}

path+=`L${width} ${height} L0 ${height} Z`

wave.setAttribute("d",path)

phase+=.08

if(fill<=0 && !done){

done=true

setTimeout(()=>{
document.getElementById("loadingScreen").style.opacity=0

setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none"
document.getElementById("drinksScreen").style.display="block"
startDrinkAnimations()
},700)

},400)

}

requestAnimationFrame(animateLogo)

}

animateLogo()



/* -------- DRINK FILL ANIMATION -------- */

function startDrinkAnimations(){

const liquids=[
document.getElementById("vodkaLiquid"),
document.getElementById("ginLiquid"),
document.getElementById("whiskeyLiquid"),
document.getElementById("rumLiquid")
]

let fillY=260
let target=74
let phase=0

function animate(){

if(fillY>target){
fillY-=1.4
phase+=0.1
}

let path=`M-40 ${fillY} `

for(let x=-40;x<=240;x++){
let y=fillY+Math.sin((x*.05)+phase)*4
path+=`L${x} ${y} `
}

path+=`L240 260 L-40 260 Z`

liquids.forEach(l=>{
l.setAttribute("d",path)
})

requestAnimationFrame(animate)

}

animate()

}
/* -------- CLICK LOGIC -------- */

const cards = document.querySelectorAll(".drinkCard");

cards.forEach(card=>{
card.addEventListener("click",()=>{
const name = card.querySelector(".drinkName").innerText;
currentBase = name; 
resetMixerUI();
document.getElementById("drinksScreen").style.display="none";
document.getElementById("mixerScreen").style.display="block";
document.getElementById("mixerTitle").innerText = name + " MIXERS";
restoreMixerUI();
});
});
function restoreMixerUI(){

    const mixerRows = document.querySelectorAll(".mixerRow");

    mixerRows.forEach(row => {

        const mixerName = row.querySelector(".mixerName").innerText;
        const addBtn = row.querySelector(".addBtn");
        const counter = row.querySelector(".counter");
        const qtyDisplay = row.querySelector(".qty");

        const existing = order.find(d =>
            d.base === currentBase && d.mixer === mixerName
        );

        if(existing){
            addBtn.style.display = "none";
            counter.style.display = "flex";
            qtyDisplay.innerText = existing.quantity;
        }
    });
}

/* -------- MIXER CLICK -------- */

/* -------- NEW MIXER QUANTITY LOGIC -------- */

const mixerRows = document.querySelectorAll(".mixerRow");

mixerRows.forEach(row => {

    const mixerName = row.querySelector(".mixerName").innerText;
    const addBtn = row.querySelector(".addBtn");
    const counter = row.querySelector(".counter");
    const minusBtn = row.querySelector(".minusBtn");
    const plusBtn = row.querySelector(".plusBtn");
    const qtyDisplay = row.querySelector(".qty");

    addBtn.addEventListener("click", () => {

        let existing = order.find(d =>
            d.base === currentBase && d.mixer === mixerName
        );

        if (existing) {
            existing.quantity++;
        } else {
            existing = {
                base: currentBase,
                mixer: mixerName,
                quantity: 1
            };
            order.push(existing);
        }

        qtyDisplay.innerText = existing.quantity;
        addBtn.style.display = "none";
        counter.style.display = "flex";

        updateOrderScreen();
    });

    plusBtn.addEventListener("click", () => {

        const existing = order.find(d =>
            d.base === currentBase && d.mixer === mixerName
        );

        if (!existing) return;

        existing.quantity++;
        qtyDisplay.innerText = existing.quantity;

        updateOrderScreen();
    });

    minusBtn.addEventListener("click", () => {

        const existing = order.find(d =>
            d.base === currentBase && d.mixer === mixerName
        );

        if (!existing) return;

        existing.quantity--;

        if (existing.quantity <= 0) {
            order = order.filter(d =>
                !(d.base === currentBase && d.mixer === mixerName)
            );

            counter.style.display = "none";
            addBtn.style.display = "block";
            qtyDisplay.innerText = "1";
        } else {
            qtyDisplay.innerText = existing.quantity;
        }

        updateOrderScreen();
    });

});
        updateOrderScreen();
  

    plusBtn.addEventListener("click", () => {
   const existing = order.find(d =>
        d.base === currentBase && d.mixer === mixerName
    );

    if(existing){
        existing.quantity++;
        qtyDisplay.innerText = existing.quantity;
    }

    updateOrderScreen();
});

    minusBtn.addEventListener("click", () => {
     const existing = order.find(d =>
        d.base === currentBase && d.mixer === mixerName
    );

    if(!existing) return;

    existing.quantity--;

    if(existing.quantity <= 0){
        order = order.filter(d =>
            !(d.base === currentBase && d.mixer === mixerName)
        );

        counter.style.display = "none";
        addBtn.style.display = "block";
        qtyDisplay.innerText = "1";
    } else {
        qtyDisplay.innerText = existing.quantity;
    }

    updateOrderScreen();
});
function goBack(){
    document.getElementById("mixerScreen").style.display = "none";
    document.getElementById("drinksScreen").style.display = "block";

    // Reset liquids before replay
    resetDrinkFill();

    // Replay animation
   
   startDrinkAnimations();
}
function resetDrinkFill(){
    const liquids = [
        document.getElementById("vodkaLiquid"),
        document.getElementById("ginLiquid"),
        document.getElementById("whiskeyLiquid"),
        document.getElementById("rumLiquid")
    ];

    liquids.forEach(l => {
        l.setAttribute("d", ""); // clear liquid path
    });
}

function addToOrder(mixerName, quantity){

    const existing = order.find(
        item => item.base === currentBase && item.mixer === mixerName
    );

    if(existing){
        existing.quantity = quantity;
    } else {
        order.push({
            base: currentBase,
            mixer: mixerName,
            quantity: quantity
        });
    }

    updateOrderScreen();
}

function updateOrderScreen(){

    const list = document.getElementById("orderList");
    list.innerHTML = "";

    order.forEach((drink,index)=>{

        const item = document.createElement("div");
        item.classList.add("orderItem");
        item.style.marginBottom = "20px";
        item.style.fontSize = "22px";

        item.innerText =
            drink.quantity + "x " + drink.base + " + " + drink.mixer;

        list.appendChild(item);
    });
}
 
function updateCheckoutScreen(){

    const list = document.getElementById("checkoutList");
    const totalEl = document.getElementById("checkoutTotal");
    const payBtn = document.getElementById("payNowBtn");

    list.innerHTML = "";

    let total = 0;

    order.forEach(drink => {

        const pricePerDrink = 12; // example price
        const lineTotal = drink.quantity * pricePerDrink;

        total += lineTotal;

        const item = document.createElement("div");
        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.marginBottom = "10px";

        item.innerHTML = `
            <span>${drink.quantity}x ${drink.base} + ${drink.mixer}</span>
            <span>€${lineTotal.toFixed(2)}</span>
        `;

        list.appendChild(item);
    });

    totalEl.innerText = "€" + total.toFixed(2);
    payBtn.innerText = "Pay €" + total.toFixed(2);
}
function goToCheckout(){

    if(order.length === 0){
        alert("No drinks selected");
        return;
    }

    document.getElementById("mixerScreen").style.display = "none";
    document.getElementById("checkoutScreen").style.display = "block";

    updateCheckoutScreen();
}
function registerOrder(){

    if(order.length === 0){
        alert("No drinks selected");
        return;
    }

    alert("Order Registered!");

    order = [];
    updateOrderScreen();
    }
function resetMixerUI(){

    const mixerRows = document.querySelectorAll(".mixerRow");

    mixerRows.forEach(row => {

        const addBtn = row.querySelector(".addBtn");
        const counter = row.querySelector(".counter");
        const qtyDisplay = row.querySelector(".qty");

        counter.style.display = "none";
        addBtn.style.display = "block";
        qtyDisplay.innerText = "1";

    });
}
function checkout(){
    alert("Payment page coming soon...");
}

function goBackToMenu(){
    document.getElementById("mixerScreen").style.display = "none";
    document.getElementById("drinksScreen").style.display = "block";
}
function backToMixer(){
    document.getElementById("checkoutScreen").style.display = "none";
    document.getElementById("mixerScreen").style.display = "block";
}
</script>
